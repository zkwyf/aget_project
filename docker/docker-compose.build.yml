version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name:  allagent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]  # 使用 pg_isready 检查数据库就绪状态
      interval: 10s    # 每10秒检查一次
      timeout: 5s      # 检查超时时间5秒
      retries: 5       # 失败重试5次
    networks:
      - allagent-network


  redis:
    image: redis:6
    container_name: allagent-redis
    command: redis-server --appendonly yes --requirepass redis123  # 启动命令：启用AOF持久化并设置访问密码
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allagent-network


  minio:
    image: minio/minio:latest
    container_name: allagent-minio
    command: server /data --console-address ":9001"  # 启动命令，指定数据目录和控制台端口
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"  # API 服务端口（可通过环境变量 MINIO_PORT 覆盖，默认 9000）
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # 控制台端口（可通过环境变量 MINIO_CONSOLE_port 覆盖，默认 9001）
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}      # 管理员用户名（默认 minioadmin）
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}  # 管理员密码（默认 minioadmin）
      MINIO_SECURE: "false"  # 禁用 HTTPS（我们没有买域名，暂时无法使用HTTPS）
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allagent-network


  ppt-mcp:
    image: allagent-ppt-mcp:latest
    container_name: allagent-ppt-mcp
    build:
      context: ../sub_projects/pptx-mcp
      dockerfile: Dockerfile
    volumes:
      - agent_files:/agent_files
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4810/ok" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allagent-network


  all-agent:
    image: allagent-server:latest
    container_name: allagent-server
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${AGENT_SERVER_PORT:-8000}:8000"
    command: langgraph up --port 8000
    volumes:
      - agent_files:/agent_files
    env_file:
      - .env
    environment:
      PPT_MCP_URL: http://ppt-mcp:4810/mcp
      DATABASE_URI: postgres://postgres:postgres@postgres:5432/postgres
      REDIS_URI: redis://:redis123@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ppt-mcp:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/ok" ]
      interval: 10s
      timeout: 20s
      retries: 5
      start_period: 90s
    networks:
      - allagent-network

  allagent-ui:
      build:
        context: ../sub_projects/agent-chat-ui
        dockerfile: Dockerfile
      image: agent-ui:latest
      container_name: allagent-ui
      depends_on:
        all-agent:
          condition: service_healthy
      ports:
        - "${AGENT_UI_PORT:-3000}:3000"
      environment:
        NEXT_PUBLIC_API_URL: http://${HOST_IP:-localhost}:${AGENT_SERVER_PORT:-8000}
      networks:
        - allagent-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  agent_files:

networks:
  allagent-network:
    driver: bridge